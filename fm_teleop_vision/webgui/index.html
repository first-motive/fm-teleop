<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FM Vision Teleop — Control</title>
<style>
  /* Bundled fonts (offline; no CDN). Schibsted Grotesk + Playfair are variable. */
  @font-face { font-family:"Schibsted Grotesk"; src:url("./fonts/schibsted-grotesk.woff2") format("woff2");
               font-weight:400 700; font-display:swap; }
  @font-face { font-family:"Space Mono"; src:url("./fonts/space-mono-400.woff2") format("woff2");
               font-weight:400; font-display:swap; }
  @font-face { font-family:"Space Mono"; src:url("./fonts/space-mono-700.woff2") format("woff2");
               font-weight:700; font-display:swap; }
  @font-face { font-family:"Playfair Display"; src:url("./fonts/playfair-italic.woff2") format("woff2");
               font-weight:400 700; font-style:italic; font-display:swap; }

  :root {
    --bg:#292430; --feed-bg:#0B090F; --cream:#ECE7D8; --accent:#B9A9DA;
    --muted:#9A90A6; --muted2:#6B6374; --ok:#8FB39B; --coral:#C97064; --coral2:#D98A80;
    --dark:#241F2B; --edge:rgba(236,231,216,0.12); --edge2:rgba(236,231,216,0.18);
    --sans:"Schibsted Grotesk",system-ui,sans-serif;
    --mono:"Space Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); }
  ::selection { background:rgba(185,169,218,0.3); }
  @keyframes fmpulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  @keyframes fmscan  { 0%{background-position:0 0;} 100%{background-position:0 -18px;} }

  .app { height:100vh; color:var(--cream); font-family:var(--sans);
         display:flex; flex-direction:column; padding:26px 34px 22px; gap:20px; overflow:hidden; }

  /* header */
  header { display:flex; align-items:center; justify-content:space-between;
           padding-bottom:18px; border-bottom:1px solid var(--edge); }
  .brand { display:flex; align-items:center; gap:16px; }
  .brand .logo { height:19px; width:auto; display:block; }
  .chip { font-family:var(--mono); font-size:10px; letter-spacing:2.5px; text-transform:uppercase;
          color:var(--muted); border:1px solid rgba(236,231,216,0.16); border-radius:4px; padding:3px 8px; }
  .conninfo { display:flex; align-items:center; gap:16px; }
  .pill { display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px;
          letter-spacing:1.5px; text-transform:lowercase; color:var(--muted);
          border:1px solid rgba(236,231,216,0.14); border-radius:999px; padding:5px 12px 5px 11px; }
  .pill .dot { width:7px; height:7px; border-radius:50%; background:var(--coral); flex-shrink:0; }
  .pill.ok .dot { background:var(--ok); } .pill.ok { color:var(--cream); }
  .pill.bad .dot { background:var(--coral); }
  #wsurl { font-family:var(--mono); font-size:12px; letter-spacing:0.5px; color:var(--cream);
           border:1px solid rgba(236,231,216,0.14); border-radius:6px; padding:6px 14px;
           background:rgba(236,231,216,0.03); width:210px; }
  #wsurl:focus { outline:none; border-color:rgba(185,169,218,0.5); }

  /* main row */
  .main { display:flex; gap:18px; flex:1; min-height:0; }
  /* camera pane (portrait) + 3D pane (fills) side by side, then the control column */
  .campane { flex-shrink:0; height:100%; display:flex; align-items:center; justify-content:center; }
  .frame { height:100%; aspect-ratio:3/4; max-width:100%; position:relative; overflow:hidden;
           background:linear-gradient(150deg,#171320 0%,#0c0a12 60%,#0a0810 100%);
           border:1px solid rgba(236,231,216,0.1); border-radius:8px;
           box-shadow:inset 0 0 140px 20px rgba(0,0,0,0.7); }
  .viewpane { flex:1; min-width:0; position:relative; background:var(--feed-bg);
              border:1px solid rgba(236,231,216,0.1); border-radius:8px; overflow:hidden; }
  #feed { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
  .scan { position:absolute; inset:0; pointer-events:none; display:none;
          background:repeating-linear-gradient(0deg,rgba(185,169,218,0.05) 0 1px,transparent 1px 3px);
          animation:fmscan 1.6s linear infinite; }
  .glow { position:absolute; inset:0; pointer-events:none; display:none;
          background:radial-gradient(120% 90% at 50% 20%,rgba(185,169,218,0.06),transparent 60%); }
  .app.live .scan, .app.live .glow { display:block; }

  .awaiting { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
              justify-content:center; gap:14px; text-align:center; padding:0 24px; }
  .awaiting .big { font-family:"Playfair Display",serif; font-style:italic; font-size:38px;
                   line-height:1; color:var(--accent); }
  .awaiting .sub { font-family:var(--mono); font-size:11px; letter-spacing:1.5px; color:var(--muted2);
                   text-transform:uppercase; }

  .hud { position:absolute; inset:0; pointer-events:none; display:none; }
  .app.hasframe .hud { display:block; }
  .hud .tl { position:absolute; top:16px; left:16px; display:flex; flex-direction:column; gap:5px;
             font-family:var(--mono); font-size:11px; letter-spacing:0.5px; color:rgba(236,231,216,0.9);
             text-shadow:0 1px 3px rgba(0,0,0,0.8); }
  .hud .tl .src { color:rgba(236,231,216,0.6); text-transform:uppercase; letter-spacing:2px; font-size:10px; }
  .hud #fps { position:absolute; top:16px; right:16px; font-family:var(--mono); font-size:11px;
              letter-spacing:1px; color:rgba(236,231,216,0.75); text-shadow:0 1px 3px rgba(0,0,0,0.8); }
  .hud .bl { position:absolute; bottom:16px; left:16px; display:flex; gap:20px; font-family:var(--mono);
             font-size:10px; letter-spacing:2px; text-transform:uppercase; color:rgba(236,231,216,0.85);
             text-shadow:0 1px 3px rgba(0,0,0,0.8); }
  .hud .bl span { display:inline-flex; align-items:center; gap:7px; }
  .hud .d { width:7px; height:7px; border-radius:50%; background:rgba(236,231,216,0.22); }
  .hud #dot-engage.on { background:var(--accent); } .hud #dot-track.on { background:var(--ok); }
  .hud .recind { position:absolute; top:38px; right:16px; display:none; align-items:center; gap:8px;
                 font-family:var(--mono); font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
                 color:var(--coral2); text-shadow:0 1px 3px rgba(0,0,0,0.8); }
  .app.recording .hud .recind { display:inline-flex; }
  .hud .recind .d2 { width:8px; height:8px; border-radius:50%; background:var(--coral);
                     animation:fmpulse 1s ease-in-out infinite; }

  /* control column */
  aside { width:352px; flex-shrink:0; display:flex; flex-direction:column; gap:14px; min-height:0; }
  .sect { display:flex; align-items:center; gap:12px; margin-bottom:2px; }
  .sect .rule { width:26px; height:1px; background:rgba(185,169,218,0.6); }
  .sect .lbl { font-family:var(--mono); font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
  .btn { font-family:var(--mono); text-transform:uppercase; cursor:pointer; border-radius:6px;
         display:flex; align-items:center; justify-content:center; gap:9px; transition:background .12s,border-color .12s,opacity .12s; }
  .btn:disabled { opacity:0.32; cursor:not-allowed; }
  .primary { height:56px; width:100%; background:var(--cream); color:var(--dark); border:none;
             font-size:13px; font-weight:700; letter-spacing:2.5px; }
  .primary:not(:disabled):hover { background:#F5F1E4; }
  .primary.engaged { background:var(--accent); color:var(--dark); }
  .primary.engaged:not(:disabled):hover { background:#c7b6e6; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .ghost { height:50px; background:transparent; color:var(--cream); border:1px solid var(--edge2);
           font-size:11px; letter-spacing:2px; }
  .ghost:not(:disabled):hover { border-color:rgba(236,231,216,0.4); background:rgba(236,231,216,0.04); }
  .accentbtn { height:50px; width:100%; background:transparent; color:var(--accent); border:1px solid rgba(185,169,218,0.35);
               font-size:11px; letter-spacing:2px; }
  .accentbtn:not(:disabled):hover { border-color:rgba(185,169,218,0.65); background:rgba(185,169,218,0.06); }
  .divider { height:1px; background:var(--edge); margin:8px 0 6px; }
  .statusgrid { display:grid; grid-template-columns:1fr 1fr; gap:22px 20px; }
  .statusgrid .cell { display:flex; flex-direction:column; gap:6px; }
  .statusgrid label { font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2); }
  .statusgrid .val { font-family:var(--mono); font-size:14px; color:var(--cream); }
  .spacer { flex:1; min-height:12px; }
  .recbtn { height:52px; width:100%; background:transparent; color:var(--coral);
            border:1px solid rgba(201,112,100,0.42); font-size:12px; font-weight:700; letter-spacing:2.5px; }
  .recbtn:not(:disabled):hover { border-color:rgba(201,112,100,0.75); background:rgba(201,112,100,0.06); }
  .app.recording .recbtn { background:var(--coral); color:var(--dark); border-color:var(--coral); }
  .recbtn .d2 { width:8px; height:8px; border-radius:50%; background:var(--coral); }
  .app.recording .recbtn .d2 { background:var(--dark); animation:fmpulse 1s ease-in-out infinite; }
  .stopbtn { height:52px; width:100%; background:transparent; color:var(--cream);
             border:1px solid rgba(236,231,216,0.3); font-size:12px; font-weight:700; letter-spacing:2.5px; }
  .stopbtn:not(:disabled):hover { border-color:rgba(236,231,216,0.55); background:rgba(236,231,216,0.05); }

  /* footer */
  footer { padding-top:14px; border-top:1px solid var(--edge); display:flex; align-items:center; gap:11px;
           font-family:var(--mono); font-size:12px; letter-spacing:0.5px; color:var(--muted); }
  #recdot { width:7px; height:7px; border-radius:50%; background:var(--muted2); }
  .app.recording #recdot { background:var(--coral); animation:fmpulse 1s ease-in-out infinite; }
  footer b { color:var(--cream); font-weight:400; }

  /* 3D arm pane (self-rendered over the same bridge; replaces the separate Foxglove window) */
  #canvas3d { position:absolute; inset:0; width:100%; height:100%; display:block; }
  .panelabel { position:absolute; top:14px; left:16px; z-index:2; font-family:var(--mono);
               font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
  .viewhint { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
              font-family:var(--mono); font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
              color:var(--muted2); pointer-events:none; text-align:center; padding:0 20px; }

  /* clickable chip button */
  .chipbtn { cursor:pointer; background:transparent; }
  .chipbtn:hover { color:var(--cream); border-color:rgba(236,231,216,0.4); }

  /* Recordings entry buttons — clearly clickable (header + control column) */
  .hdrbtn { cursor:pointer; font-family:var(--mono); font-size:11px; letter-spacing:1.5px;
            text-transform:uppercase; color:var(--accent); background:rgba(185,169,218,0.10);
            border:1px solid rgba(185,169,218,0.45); border-radius:6px; padding:7px 14px;
            transition:background .12s,border-color .12s; }
  .hdrbtn:hover { background:rgba(185,169,218,0.20); border-color:var(--accent); }
  .viewrec { cursor:pointer; height:46px; width:100%; background:rgba(185,169,218,0.08);
             color:var(--accent); border:1px solid rgba(185,169,218,0.4); border-radius:6px;
             font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:2px;
             text-transform:uppercase; }
  .viewrec:hover { background:rgba(185,169,218,0.16); border-color:var(--accent); }

  /* chart cursor readout (tracking over the time series) */
  .chart-readout { position:sticky; top:0; z-index:2; background:var(--bg);
                   font-family:var(--mono); font-size:11px; letter-spacing:0.5px; color:var(--muted);
                   padding:8px 0 12px; border-bottom:1px solid var(--edge); margin-bottom:14px;
                   min-height:44px; display:flex; flex-direction:column; gap:5px; }
  .chart-readout .rd-top { color:var(--cream); }
  .chart-readout .rd-top b { color:var(--accent); font-weight:700; }
  .chart-readout .rd-why { color:var(--coral2); }
  .chart-readout .rd-hint { color:var(--muted2); }
  canvas.chart { cursor:crosshair; }

  /* recordings viewer overlay */
  .recordings { position:fixed; inset:0; z-index:20; background:var(--bg); display:none;
                flex-direction:column; padding:26px 34px 22px; gap:18px; }
  .recordings.open { display:flex; }
  .rec-head { display:flex; align-items:center; justify-content:space-between;
              padding-bottom:16px; border-bottom:1px solid var(--edge); }
  .rec-title { font-family:var(--mono); font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--cream); }
  .rec-body { display:flex; gap:20px; flex:1; min-height:0; }
  .rec-list { width:300px; flex-shrink:0; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
  .rec-detail { flex:1; min-width:0; overflow-y:auto; padding-right:6px; }
  .rec-empty { font-family:var(--mono); font-size:11px; letter-spacing:1px; color:var(--muted2); padding:20px 4px; }
  .rec-card { border:1px solid var(--edge); border-radius:8px; padding:12px 14px; cursor:pointer;
              background:rgba(236,231,216,0.02); transition:border-color .12s,background .12s; }
  .rec-card:hover { border-color:rgba(185,169,218,0.5); background:rgba(185,169,218,0.05); }
  .rec-card.sel { border-color:var(--accent); background:rgba(185,169,218,0.08); }
  .rec-card .id { font-family:var(--mono); font-size:12px; color:var(--cream); }
  .rec-card .meta { font-family:var(--mono); font-size:10px; letter-spacing:0.5px; color:var(--muted);
                    margin-top:6px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .badge { font-family:var(--mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:2px 7px; border-radius:999px; }
  .badge-ok { color:var(--ok); border:1px solid rgba(143,179,155,0.4); }
  .badge-warn { color:var(--coral2); border:1px solid rgba(217,138,128,0.4); }

  .dash { display:grid; grid-template-columns:repeat(4,1fr); gap:16px 20px; margin-bottom:26px; }
  .dash .cell { display:flex; flex-direction:column; gap:5px; }
  .dash label { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted2); }
  .dash .v { font-family:var(--mono); font-size:15px; color:var(--cream); }
  .dash .v.sm { font-size:11px; line-height:1.5; }
  .sect-title { font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase;
                color:var(--muted); margin:4px 0 14px; display:flex; align-items:center; gap:10px; }
  .sect-title::before { content:""; width:22px; height:1px; background:rgba(185,169,218,0.6); }
  .charts { display:flex; flex-direction:column; gap:20px; }
  .chart-lbl { font-family:var(--mono); font-size:10px; letter-spacing:1px; color:var(--muted); margin-bottom:6px;
               display:flex; gap:14px; flex-wrap:wrap; }
  .chart-lbl .k { display:inline-flex; align-items:center; gap:6px; }
  .chart-lbl .k i { width:14px; height:2px; display:inline-block; }
  canvas.chart { width:100%; height:150px; display:block; background:var(--feed-bg);
                 border:1px solid rgba(236,231,216,0.08); border-radius:6px; }
</style>
</head>
<body>
<div class="app" id="app">

  <header>
    <div class="brand">
      <img class="logo" src="./fm-logo.svg" alt="First Motive" />
      <span class="chip">Vision Teleop</span>
    </div>
    <div class="conninfo">
      <button id="recordings-btn" class="hdrbtn">▤ Recordings</button>
      <span id="conn" class="pill bad"><span class="dot"></span><span id="conntext">connecting…</span></span>
      <input id="wsurl" spellcheck="false" />
    </div>
  </header>

  <div class="main">
    <section class="campane">
      <div class="frame">
        <img id="feed" alt="vision feed" />
        <div class="scan"></div>
        <div class="glow"></div>
        <div class="awaiting" id="awaiting">
          <span class="big">Awaiting signal</span>
          <span class="sub" id="awaitsub">reconnecting to ws://localhost:8765</span>
        </div>
        <div class="hud">
          <div class="tl"><span id="clock"></span><span class="src">Vision feed</span></div>
          <span id="fps"></span>
          <div class="bl">
            <span><span id="dot-engage" class="d"></span>engaged</span>
            <span><span id="dot-track" class="d"></span>tracking</span>
          </div>
          <div class="recind"><span class="d2"></span>rec <span id="rectime"></span></div>
        </div>
      </div>
    </section>

    <section class="viewpane">
      <canvas id="canvas3d"></canvas>
      <span class="panelabel">3D Arm</span>
      <div class="viewhint" id="view3dmsg">waiting for robot…</div>
    </section>

    <aside>
      <div class="sect"><span class="rule"></span><span class="lbl">Control</span></div>

      <button class="btn primary act" id="engagebtn" data-topic="/vision/engage" data-val="1">▶ Engage</button>
      <button class="btn accentbtn act" data-topic="/vision/reset" data-val="1">⟲ Reset</button>

      <div class="divider"></div>

      <div class="statusgrid">
        <div class="cell"><label>Status</label><span class="val" id="statusval">—</span></div>
        <div class="cell"><label>Signal</label><span class="val" id="signalval">connecting…</span></div>
        <div class="cell"><label>Session</label><span class="val" id="sessionval">—</span></div>
        <div class="cell"><label>Latency</label><span class="val" id="latval">—</span></div>
      </div>

      <div class="spacer"></div>

      <button class="btn recbtn act" id="recbtn" data-topic="/capture/record" data-val="1"><span class="d2"></span><span id="reclabel">Rec</span></button>
      <button class="btn viewrec" id="recordings-btn2">▤ View Recordings</button>
    </aside>
  </div>

  <footer><span id="recdot"></span>capture: <b id="capstatus">—</b></footer>

  <!-- Recordings viewer (overlay; opened from the header, closed back to the live view) -->
  <div id="recordings" class="recordings">
    <div class="rec-head">
      <span class="rec-title">Recordings</span>
      <button id="rec-close" class="chip chipbtn">✕ Close</button>
    </div>
    <div class="rec-body">
      <div class="rec-list" id="rec-list"><div class="rec-empty">no recordings yet</div></div>
      <div class="rec-detail" id="rec-detail"><div class="rec-empty">select a recording to view its data</div></div>
    </div>
  </div>
</div>

<!-- 3D libs: classic (non-module) builds so they load from file:// without ESM CORS issues -->
<script src="./vendor/three.min.js"></script>
<script src="./vendor/STLLoader.js"></script>
<script src="./vendor/ColladaLoader.js"></script>
<script src="./vendor/OrbitControls.js"></script>
<script src="./vendor/URDFLoader.js"></script>
<script src="./viewer3d.js"></script>

<script>
"use strict";
// ---- Foxglove WebSocket protocol (v1) client, dependency-free -------------------------
// Talks to foxglove_bridge (ws://localhost:8765). Subscribes to /vision/image (jpeg) and
// /capture/status (String); publishes std_msgs/Bool to /vision/engage, /vision/reset,
// /capture/record. clientPublish is enabled on the bridge by default.

const SUB_TOPICS = {
  "/vision/image":            onImage,
  "/capture/status":          onStatus,
  "/vision/engage":           onEngage,
  "/vision/tracking_active":  onTracking,
  "/robot_description":       onRobotDescription,   // 3D: URDF (latched String)
  "/joint_states":            onJointStates,        // 3D: drive arm joints
  "/target_pose":             onTargetPose,         // 3D: target gizmo
  "/capture/index":           onCaptureIndex,       // recordings: session list (latched JSON)
  "/capture/detail":          onCaptureDetail,      // recordings: selected session (JSON)
};
// Client publish channels (arbitrary ids we assign). encoding cdr, schema std_msgs/msg/Bool.
const PUB_TOPICS = ["/vision/engage", "/vision/reset", "/capture/record"];
const BOOL_SCHEMA = "std_msgs/msg/Bool";
// CDR for std_msgs/Bool: 4-byte encapsulation header (PLAIN_CDR little-endian) + 1 bool byte.
const boolCdr = (v) => new Uint8Array([0x00, 0x01, 0x00, 0x00, v ? 1 : 0]);

const params = new URLSearchParams(location.search);
const defaultUrl = params.get("ws") || "ws://localhost:8765";
const urlInput = document.getElementById("wsurl");
urlInput.value = defaultUrl;

let ws = null;
let chanByTopic = new Map();     // topic -> server channelId
let topicBySubId = new Map();    // our subscriptionId -> topic
let subIdByTopic = new Map();    // topic -> subscriptionId
let pubChanByTopic = new Map();  // topic -> our client channelId
let nextSubId = 1, nextPubId = 100;
let lastImgUrl = null, frames = 0, lastFpsT = 0, lastFrameT = 0;

// ---- presentation state (glue only; transport above is unchanged) ---------------------
const app = document.getElementById("app");
const ui = { connected:false, engaged:false, tracking:false, recording:false, session:"", recStart:0 };

function setConn(state, text) {
  ui.connected = state === "ok";
  const el = document.getElementById("conn");
  el.className = "pill " + (state === "ok" ? "ok" : "bad");
  document.getElementById("conntext").textContent = text;
  document.getElementById("signalval").textContent = text;
  document.getElementById("awaitsub").textContent =
    ui.connected ? "waiting for /vision/image…" : "reconnecting to " + urlInput.value.trim();
  render();
}

function render() {
  app.classList.toggle("live", ui.connected);
  app.classList.toggle("recording", ui.recording);
  const status = !ui.connected ? "reconnecting"
               : ui.recording ? "recording"
               : ui.engaged   ? "engaged" : "idle";
  document.getElementById("statusval").textContent = status;
  document.getElementById("sessionval").textContent = ui.session || "—";
  // engage is a single play/pause toggle: flip its published value + label from the state.
  const eng = document.getElementById("engagebtn");
  eng.dataset.val = ui.engaged ? "0" : "1";
  eng.innerHTML = ui.engaged ? "❚❚ Disengage" : "▶ Engage";
  eng.classList.toggle("engaged", ui.engaged);
  // record is a single play/stop toggle: ● Rec when idle, ■ Stop while recording.
  const rec = document.getElementById("recbtn");
  const dis = rec.classList.contains("disconnected");
  rec.dataset.val = ui.recording ? "0" : "1";
  document.getElementById("reclabel").textContent = ui.recording ? "Stop" : "Rec";
  rec.disabled = dis;
}

function connect() {
  const url = urlInput.value.trim();
  // foxglove_bridge >=3.x (Foxglove SDK) negotiates "foxglove.sdk.v1"; the classic C++ bridge
  // uses "foxglove.websocket.v1". Offer both — the message protocol is identical either way.
  try { ws = new WebSocket(url, ["foxglove.sdk.v1", "foxglove.websocket.v1"]); }
  catch (e) { setConn("bad", "bad url"); return; }
  ws.binaryType = "arraybuffer";
  chanByTopic = new Map(); topicBySubId = new Map(); subIdByTopic = new Map();
  pubChanByTopic = new Map(); nextSubId = 1; nextPubId = 100;

  ws.onopen = () => { setConn("ok", "connected"); console.log("[ws] open", url); };
  ws.onclose = () => { setConn("bad", "reconnecting…"); disableButtons(true); console.log("[ws] close"); setTimeout(connect, 1500); };
  ws.onerror = (e) => { console.warn("[ws] error", e); };
  ws.onmessage = onMessage;
}

function onMessage(ev) {
  if (typeof ev.data === "string") { onJson(JSON.parse(ev.data)); return; }
  const dv = new DataView(ev.data);
  const op = dv.getUint8(0);
  if (op === 4) { onFetchAssetResponse(ev.data); return; }   // 4 = FETCH_ASSET_RESPONSE
  if (op !== 1) return;                             // 1 = MESSAGE_DATA
  const subId = dv.getUint32(1, true);              // [1][subId u32][ts u64][payload]
  const topic = topicBySubId.get(subId);
  if (!topic) return;
  const payload = new Uint8Array(ev.data, 1 + 4 + 8);
  SUB_TOPICS[topic]?.(payload);
}

function onJson(msg) {
  if (msg.op === "advertise") {
    for (const ch of msg.channels) {
      chanByTopic.set(ch.topic, ch.id);
      if (SUB_TOPICS[ch.topic] && !subIdByTopic.has(ch.topic)) subscribe(ch.topic, ch.id);
    }
  } else if (msg.op === "unadvertise") {
    for (const id of msg.channelIds || []) {
      for (const [t, cid] of chanByTopic) if (cid === id) chanByTopic.delete(t);
    }
  } else if (msg.op === "serverInfo") {
    console.log("[ws] serverInfo", msg.name, msg.capabilities);
    hasAssets = Array.isArray(msg.capabilities) && msg.capabilities.includes("assets");
    updateAssetsUI();                               // enable/disable the 3D tab
    if (hasAssets && urdfXml && threeReady) Viewer3D.setURDF(urdfXml, fetchAsset);
    advertisePublishers();                          // advertise our Bool publish channels
    disableButtons(false);
  }
}

function subscribe(topic, channelId) {
  const id = nextSubId++;
  subIdByTopic.set(topic, id); topicBySubId.set(id, topic);
  ws.send(JSON.stringify({ op: "subscribe", subscriptions: [{ id, channelId }] }));
  console.log("[ws] subscribe", topic, "sub", id, "chan", channelId);
}

function advertisePublishers() {
  const channels = PUB_TOPICS.map((topic) => {
    const id = nextPubId++;
    pubChanByTopic.set(topic, id);
    return { id, topic, encoding: "cdr", schemaName: BOOL_SCHEMA };
  });
  // /capture/select is a std_msgs/String request for the recordings viewer.
  const sid = nextPubId++;
  pubChanByTopic.set("/capture/select", sid);
  channels.push({ id: sid, topic: "/capture/select", encoding: "cdr", schemaName: "std_msgs/msg/String" });
  ws.send(JSON.stringify({ op: "advertise", channels }));
  console.log("[ws] advertise publishers", channels);
}

// CDR std_msgs/String: [00 01 00 00 encaps][uint32 len incl null][utf8][00].
function stringCdr(s) {
  const utf8 = new TextEncoder().encode(s);
  const len = utf8.length + 1;
  const buf = new Uint8Array(8 + len);
  buf[1] = 1;                                       // little-endian encapsulation header
  new DataView(buf.buffer).setUint32(4, len, true);
  buf.set(utf8, 8);                                 // trailing byte stays 0 (null terminator)
  return buf;
}
function publishString(topic, s) {
  const cid = pubChanByTopic.get(topic);
  if (cid == null || !ws || ws.readyState !== 1) { console.warn("cannot publish", topic); return; }
  const cdr = stringCdr(s);
  const buf = new Uint8Array(1 + 4 + cdr.length);
  const dv = new DataView(buf.buffer);
  dv.setUint8(0, 1);
  dv.setUint32(1, cid, true);
  buf.set(cdr, 5);
  ws.send(buf);
}

function publishBool(topic, val) {
  const cid = pubChanByTopic.get(topic);
  if (cid == null || !ws || ws.readyState !== 1) { console.warn("cannot publish", topic); return; }
  const cdr = boolCdr(val);
  const buf = new Uint8Array(1 + 4 + cdr.length);
  const dv = new DataView(buf.buffer);
  dv.setUint8(0, 1);                                 // client MESSAGE_DATA opcode
  dv.setUint32(1, cid, true);                        // our client channel id
  buf.set(cdr, 5);
  ws.send(buf);
  console.log("[pub]", topic, val);
}

// ---- message decoders -----------------------------------------------------------------
function onImage(payload) {
  // SOI-scan: find the JPEG start marker FF D8 FF and take to the end (skips CDR header parse).
  let i = 0;
  for (; i + 2 < payload.length; i++) {
    if (payload[i] === 0xff && payload[i + 1] === 0xd8 && payload[i + 2] === 0xff) break;
  }
  if (i + 2 >= payload.length) return;
  const blob = new Blob([payload.subarray(i)], { type: "image/jpeg" });
  const url = URL.createObjectURL(blob);
  const img = document.getElementById("feed");
  img.onload = () => { if (lastImgUrl) URL.revokeObjectURL(lastImgUrl); lastImgUrl = url; };
  img.src = url;
  img.style.display = "block";
  app.classList.add("hasframe");
  document.getElementById("awaiting").style.display = "none";
  frames++;
  const now = performance.now();
  document.getElementById("latval").textContent = lastFrameT ? Math.round(now - lastFrameT) + " ms" : "—";
  lastFrameT = now;
  if (now - lastFpsT > 1000) { document.getElementById("fps").textContent = frames + " FPS"; frames = 0; lastFpsT = now; }
}

function cdrString(payload) {
  // [4-byte encapsulation header][uint32 length incl. null][chars][null]
  if (payload.length < 8) return "";
  const dv = new DataView(payload.buffer, payload.byteOffset, payload.byteLength);
  const len = dv.getUint32(4, true);
  const end = Math.min(8 + Math.max(0, len - 1), payload.length);
  return new TextDecoder().decode(payload.subarray(8, end));
}

function onStatus(payload) {
  const text = cdrString(payload) || "—";
  document.getElementById("capstatus").textContent = text;
  const rec = text.startsWith("recording");
  if (rec && !ui.recording) ui.recStart = performance.now();
  ui.recording = rec;
  // session dir: the recorder emits "recording -> <dir>"; show its basename.
  const m = text.match(/([0-9]{8}_[0-9]{6}[^\s]*)/);
  ui.session = m ? m[1] : (rec ? ui.session : "");
  render();
}
function onEngage(payload)   { ui.engaged = payload[payload.length - 1] === 1; setDot("dot-engage", ui.engaged); render(); }
function onTracking(payload) { ui.tracking = payload[payload.length - 1] === 1; setDot("dot-track",  ui.tracking); }
function setDot(id, on) { document.getElementById(id).classList.toggle("on", !!on); }

// ---- 3D arm viewer (three.js over the same bridge; no Foxglove app) --------------------
let threeReady = false, hasAssets = false, urdfXml = null;
let nextReqId = 1; const pendingAssets = new Map();

// Fetch a package:// mesh asset over the WS bridge (Foxglove fetchAsset) -> Promise<Uint8Array>.
function fetchAsset(uri) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== 1) { reject(new Error("ws closed")); return; }
    const requestId = nextReqId++;
    pendingAssets.set(requestId, { resolve, reject });
    ws.send(JSON.stringify({ op: "fetchAsset", uri, requestId }));
  });
}
function onFetchAssetResponse(buf) {
  // [4][requestId u32][status u8][errLen u32][errMsg][data]
  const dv = new DataView(buf);
  let o = 1;
  const requestId = dv.getUint32(o, true); o += 4;
  const status = dv.getUint8(o); o += 1;
  const errLen = dv.getUint32(o, true); o += 4;
  const p = pendingAssets.get(requestId); if (!p) return;
  pendingAssets.delete(requestId);
  if (status === 0) p.resolve(new Uint8Array(buf, o + errLen));
  else p.reject(new Error(new TextDecoder().decode(new Uint8Array(buf, o, errLen))));
}

// Minimal little-endian CDR reader. Skips the 4-byte encapsulation header; primitive
// alignment is relative to the body start (i.e. AFTER the encapsulation header), matching
// FastCDR. Enough for JointState + PoseStamped.
function CDR(u8) { this.dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength); this.u8 = u8; this.o = 4; }
CDR.prototype.align = function (n) { const m = (this.o - 4) % n; if (m) this.o += n - m; };
CDR.prototype.u32 = function () { this.align(4); const v = this.dv.getUint32(this.o, true); this.o += 4; return v; };
CDR.prototype.i32 = function () { this.align(4); const v = this.dv.getInt32(this.o, true); this.o += 4; return v; };
CDR.prototype.f64 = function () { this.align(8); const v = this.dv.getFloat64(this.o, true); this.o += 8; return v; };
CDR.prototype.str = function () { const n = this.u32(); const s = new TextDecoder().decode(this.u8.subarray(this.o, this.o + Math.max(0, n - 1))); this.o += n; return s; };
CDR.prototype.strSeq = function () { const n = this.u32(); const a = []; for (let i = 0; i < n; i++) a.push(this.str()); return a; };
CDR.prototype.f64Seq = function () { const n = this.u32(); this.align(8); const a = new Array(n); for (let i = 0; i < n; i++) { a[i] = this.dv.getFloat64(this.o, true); this.o += 8; } return a; };
CDR.prototype.skipHeader = function () { this.i32(); this.u32(); this.str(); };  // stamp sec, nanosec, frame_id

function onRobotDescription(payload) {
  urdfXml = cdrString(payload);
  if (threeReady && hasAssets) Viewer3D.setURDF(urdfXml, fetchAsset);
}
function onJointStates(payload) {
  if (!threeReady) return;
  const r = new CDR(payload); r.skipHeader();
  Viewer3D.setJoints(r.strSeq(), r.f64Seq());
}
function onTargetPose(payload) {
  if (!threeReady) return;
  const r = new CDR(payload); r.skipHeader();
  Viewer3D.setTarget([r.f64(), r.f64(), r.f64()], [r.f64(), r.f64(), r.f64(), r.f64()]);
}

const CHART_PAD = { l: 8, r: 8, t: 8, b: 8 };

function addChart(parent, label, t, seriesList) {
  seriesList = seriesList.filter((s) => s.data && s.data.some((v) => v != null));
  if (!seriesList.length) return;
  const wrap = document.createElement("div");
  const legend = seriesList.map((s) => '<span class="k"><i style="background:' + s.color + '"></i>' + s.label + '</span>').join("");
  wrap.innerHTML = '<div class="chart-lbl"><span>' + label + '</span>' + legend + '</div>';
  const canvas = document.createElement("canvas");
  canvas.className = "chart";
  wrap.appendChild(canvas);
  parent.appendChild(wrap);
  const rec = { canvas, t, seriesList };
  chartRegistry.push(rec);
  drawChart(rec, null);
  canvas.addEventListener("mousemove", (e) => onChartMove(e, rec));
  canvas.addEventListener("mouseleave", () => { cursorIdx = null; scheduleRedraw(); });
}

function onChartMove(e, rec) {
  const n = (rec.t && rec.t.length) || 0;
  if (!n) return;
  const box = rec.canvas.getBoundingClientRect();
  const frac = (e.clientX - box.left - CHART_PAD.l) / (box.width - CHART_PAD.l - CHART_PAD.r);
  cursorIdx = Math.max(0, Math.min(n - 1, Math.round(frac * (n - 1))));
  scheduleRedraw();
}

// One rAF redraws every chart with the shared cursor + refreshes the readout (cheap, synced).
function scheduleRedraw() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    rafPending = false;
    for (const rec of chartRegistry) drawChart(rec, cursorIdx);
    updateReadout(cursorIdx);
  });
}

function drawChart(rec, cur) {
  const { canvas, t, seriesList } = rec;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (!w || !h) return;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext("2d"); ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);
  const pad = CHART_PAD;
  const n = (t && t.length) || 0;
  if (!n || !seriesList.length) return;
  let lo = Infinity, hi = -Infinity;
  for (const s of seriesList) for (const v of s.data) if (v != null) { if (v < lo) lo = v; if (v > hi) hi = v; }
  if (!isFinite(lo)) return;
  if (hi - lo < 1e-9) { hi += 0.5; lo -= 0.5; }
  const px = (i) => pad.l + (w - pad.l - pad.r) * (n > 1 ? i / (n - 1) : 0.5);
  const py = (v) => pad.t + (h - pad.t - pad.b) * (1 - (v - lo) / (hi - lo));
  if (lo < 0 && hi > 0) {
    ctx.strokeStyle = "rgba(236,231,216,0.12)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, py(0)); ctx.lineTo(w - pad.r, py(0)); ctx.stroke();
  }
  for (const s of seriesList) {
    ctx.strokeStyle = s.color; ctx.lineWidth = 1.4; ctx.beginPath();
    let started = false;
    for (let i = 0; i < n; i++) {
      const v = s.data[i];
      if (v == null) { started = false; continue; }
      const x = px(i), y = py(v);
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  if (cur != null && cur >= 0 && cur < n) {
    const x = px(cur);
    ctx.strokeStyle = "rgba(236,231,216,0.4)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, h - pad.b); ctx.stroke();
    for (const s of seriesList) {
      const v = s.data[cur];
      if (v == null) continue;
      ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(x, py(v), 2.6, 0, Math.PI * 2); ctx.fill();
    }
  }
}

const SERVO_WHY = {
  1: "decelerating near singularity", 2: "HALTED at singularity", 3: "leaving singularity",
  4: "decel (collision guard)", 5: "HALTED (collision guard)", 6: "at joint limit",
};

function updateReadout(idx) {
  const el = document.getElementById("chart-readout");
  if (!el) return;
  if (idx == null || !detailSeries) {
    el.innerHTML = '<span class="rd-hint">hover a chart to scrub time — values + state + why, at that instant</span>';
    return;
  }
  const at = (k) => { const a = detailSeries[k]; return a ? a[idx] : null; };
  const t = at("t"), err = at("err_dist"), grip = at("grip");
  const flags = [(at("engage") >= 0.5) ? "engaged" : "disengaged"];
  if (at("tracking") >= 0.5) flags.push("tracking");
  if (at("commanding_est") >= 0.5) flags.push("commanding");
  const parts = ["t <b>" + (t != null ? t.toFixed(1) : "—") + "s</b>"];
  if (err != null) parts.push("err <b>" + (err * 100).toFixed(1) + "cm</b>");
  if (grip != null) parts.push("grip <b>" + grip.toFixed(2) + "</b>");
  el.innerHTML =
    '<span class="rd-top">' + parts.join("  ·  ") + "  ·  " + flags.join(" · ") + '</span>' +
    '<span class="rd-why">' + insightAt(idx) + '</span>';
}

function insightAt(idx) {
  const at = (k) => { const a = detailSeries[k]; return a ? a[idx] : null; };
  const eng = at("engage"), trk = at("tracking"), cmd = at("commanding_est");
  const ss = Math.round(at("servo_status") || 0);
  const err = at("err_dist"), grip = at("grip");
  const why = [];
  if (eng < 0.5) why.push("disengaged — arm holds, no command");
  else if (trk < 0.5) why.push("hand not tracked — command paused");
  else if (cmd < 0.5) why.push("waiting for a fresh hand pose");
  if (ss && SERVO_WHY[ss]) why.push("servo " + SERVO_WHY[ss]);
  if (err != null && err > 0.15 && !why.length) why.push("large error — arm lagging the target");
  if (grip != null) { if (grip < 0.35) why.push("grip open"); else if (grip > 0.65) why.push("grip closed"); }
  return why.length ? "why: " + why.join(" · ") : "tracking nominally";
}

// ---- UI glue --------------------------------------------------------------------------
function disableButtons(dis) {
  document.querySelectorAll("button.act").forEach((b) => {
    b.disabled = dis; b.classList.toggle("disconnected", dis);
  });
  if (!dis) render();   // re-apply rec/stop affordances once connected
}
document.querySelectorAll("button.act").forEach((btn) => {
  btn.addEventListener("click", () => publishBool(btn.dataset.topic, btn.dataset.val === "1"));
});
urlInput.addEventListener("change", () => { if (ws) ws.close(); connect(); });

// clock + rec timer (HUD)
const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const pad = (n) => String(n).padStart(2, "0");
setInterval(() => {
  const d = new Date();
  document.getElementById("clock").textContent =
    `${pad(d.getDate())} ${MONTHS[d.getMonth()]} ${d.getFullYear()} · ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  if (ui.recording) {
    const s = (performance.now() - ui.recStart) / 1000;
    const t = `${pad(Math.floor(s / 60))}:${(s % 60).toFixed(1).padStart(4, "0")}`;
    document.getElementById("rectime").textContent = t;
  }
  if (threeReady) { updateAssetsUI(); view3dmsg.style.display = (hasAssets && Viewer3D.ready()) ? "none" : ""; }
}, 200);

disableButtons(true);
setConn("bad", "connecting…");
connect();
</script>
