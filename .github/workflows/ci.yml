name: CI

on:
  push:
    branches: ["**"]
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore"]
  pull_request:
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore"]

# Standalone build: clone this repo, pull its .repos siblings + externals, then
# colcon build + test in a Humble container. Proves the package stands on its own
# outside the fm-ros2 monorepo.
jobs:
  build-test:
    name: build + test (humble)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          path: src/fm-teleop

      - name: Import siblings + externals
        run: |
          apt-get update && apt-get install -y python3-vcstool
          vcs import < src/fm-teleop/fm-teleop.repos

      - name: Install ROS deps
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths src --ignore-src -y -r || true

      - name: colcon build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: colcon test
        run: |
          source /opt/ros/humble/setup.bash
          colcon test
          colcon test-result --verbose

  image:
    name: build image (FROM fm-robot layer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The Dockerfile is FROM the fm-robot layer, a private-by-default GHCR
      # package; log in to pull it.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the teleop image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: fm-teleop:humble

  smoke:
    name: smoke run.sh (native headless)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Install tooling + ROS deps
        run: |
          # No git externals to import — fm-teleop.repos pulls only docker/, which
          # the native path does not use. Just resolve the package deps via rosdep.
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths . --ignore-src -y -r || true

      - name: Launch headless, bounded
        run: |
          # run.sh native builds in place, then `ros2 run`s joy_to_servo — it spins
          # waiting on /joy, so bound it as a smoke check. timeout SIGTERM (143) /
          # timeout-reached (124) both mean it came up; anything else is a fail.
          set +e
          timeout --preserve-status 90 ./run.sh --native
          code=$?
          [ "$code" -eq 124 ] || [ "$code" -eq 143 ] || [ "$code" -eq 0 ]
