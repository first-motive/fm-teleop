name: CI

on:
  push:
    branches: ["**"]
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore", "plans/**"]
  pull_request:
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore", "plans/**"]

# Standalone build: clone this repo, pull its .repos siblings + externals, then
# colcon build + test in a Humble container. Proves the package stands on its own
# outside the fm-ros2 monorepo.
jobs:
  selftest:
    name: bootstrap self-test (curl|bash FM_SELFTEST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # install.sh and run.sh are curl|bash-able. Run each from an empty dir so it
      # takes its network branch — the piped path real users hit — fetching lib.sh
      # from the pinned fm-tools tag. FM_SELFTEST stops each script after deps load
      # and OS/backend resolve, before any OrbStack install, build, or launch.
      - name: install.sh + run.sh load lib + resolve over piped curl
        run: |
          set -euo pipefail
          repo="$PWD"
          cd "$(mktemp -d)"
          for s in install.sh run.sh; do
            echo "== $s =="
            out="$(cat "$repo/$s" | FM_SELFTEST=1 bash 2>&1)" \
              || { echo "$out"; echo "FAIL: $s exited non-zero under curl|bash"; exit 1; }
            echo "$out"
            echo "$out" | grep -q "selftest ok" \
              || { echo "FAIL: $s did not reach 'selftest ok'"; exit 1; }
          done
          echo "bootstrap self-test OK"

  build-test:
    name: build + test (humble)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          path: src/fm-teleop

      - name: Import siblings + externals
        run: |
          apt-get update && apt-get install -y python3-vcstool
          vcs import < src/fm-teleop/fm-teleop.repos

      - name: Install ROS deps
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths src --ignore-src -y -r || true

      - name: colcon build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: colcon test
        run: |
          source /opt/ros/humble/setup.bash
          colcon test
          colcon test-result --verbose

  image:
    name: build + publish image (FROM fm-robot layer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      # Pin a recent qemu: the default ships an older build whose arm64 user-mode
      # emulation segfaults on heavy glibc postinst (libc-bin/ldconfig under the
      # moveit install). Newer qemu emulates that path cleanly.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v10.2.3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR — to pull the private fm-robot base FROM and to push this
      # layer (the Dockerfile is FROM ghcr.io/first-motive/fm-robot:humble).
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build multi-arch (arm64 + amd64). Publish to GHCR only on main — branch and
      # PR runs build to validate without pushing.
      - name: Build + publish the teleop image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/first-motive/fm-teleop:humble
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    name: smoke run.sh (native headless)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Install tooling + ROS deps
        run: |
          # No git externals to import — fm-teleop.repos pulls only docker/, which
          # the native path does not use. Resolve the package deps via rosdep.
          # apt-get update first: the base image ships no package lists, so
          # rosdep's `apt-get install` (e.g. ros-humble-control-msgs) would 404.
          source /opt/ros/humble/setup.bash
          apt-get update
          rosdep update
          rosdep install --from-paths . --ignore-src -y -r

      - name: Build workspace
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Launch headless, bounded
        run: |
          # Workspace pre-built above, so run.sh's incremental build is quick. It
          # then `ros2 run`s joy_to_servo, which spins waiting on /joy, so the bounded
          # window covers it. 124 = ran the full window (came up); 0 = clean exit.
          set +e
          timeout 90 ./run.sh --native
          code=$?
          [ "$code" -eq 124 ] || [ "$code" -eq 0 ] || [ "$code" -eq 143 ]
