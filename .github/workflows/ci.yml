name: CI

on:
  push:
    branches: ["**"]
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore"]
  pull_request:
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore"]

# Standalone build: clone this repo, pull its .repos siblings + externals, then
# colcon build + test in a Humble container. Proves the package stands on its own
# outside the fm-ros2 monorepo.
jobs:
  build-test:
    name: build + test (humble)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          path: src/fm-teleop

      - name: Import siblings + externals
        run: |
          apt-get update && apt-get install -y python3-vcstool
          vcs import < src/fm-teleop/fm-teleop.repos

      - name: Install ROS deps
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths src --ignore-src -y -r || true

      - name: colcon build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: colcon test
        run: |
          source /opt/ros/humble/setup.bash
          colcon test
          colcon test-result --verbose

  image:
    name: build + publish image (FROM fm-robot layer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR — to pull the private fm-robot base FROM and to push this
      # layer (the Dockerfile is FROM ghcr.io/first-motive/fm-robot:humble).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build multi-arch (arm64 + amd64). Publish to GHCR only on main — branch and
      # PR runs build to validate without pushing.
      - name: Build + publish the teleop image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/first-motive/fm-teleop:humble
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    name: smoke run.sh (native headless)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Install tooling + ROS deps
        run: |
          # No git externals to import — fm-teleop.repos pulls only docker/, which
          # the native path does not use. Just resolve the package deps via rosdep.
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths . --ignore-src -y -r || true

      - name: Build workspace
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Launch headless, bounded
        run: |
          # Workspace pre-built above, so run.sh's incremental build is quick. It
          # then `ros2 run`s joy_to_servo, which spins waiting on /joy, so the bounded
          # window covers it. 124 = ran the full window (came up); 0 = clean exit.
          set +e
          timeout 90 ./run.sh --native
          code=$?
          [ "$code" -eq 124 ] || [ "$code" -eq 0 ] || [ "$code" -eq 143 ]
